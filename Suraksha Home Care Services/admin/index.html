<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Suraksha Home Services</title>
<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
      <div class="logo-text">Suraksha<span>Home Services</span></div>
    </div>
    <h2>Admin Login</h2>
    <p class="login-subtitle">Sign in to access the admin dashboard</p>
    <form id="loginForm" class="admin-form" style="border:none;box-shadow:none;padding:0">
      <div class="admin-form-group">
        <label class="admin-form-label" for="username">Username <span class="required">*</span></label>
        <input type="text" id="username" class="admin-form-control" placeholder="Enter your username" required autocomplete="username">
        <div class="admin-form-error">Please enter your username</div>
      </div>
      <div class="admin-form-group">
        <label class="admin-form-label" for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" class="admin-form-control" placeholder="Enter your password" required autocomplete="current-password">
        <div class="admin-form-error">Please enter your password</div>
      </div>
      <button type="submit" id="loginBtn" class="admin-btn admin-btn-primary admin-btn-block admin-btn-lg">
        <i class="fas fa-sign-in-alt"></i> <span>Sign In</span>
      </button>
    </form>
    <div class="login-footer">
      <i class="fas fa-shield-alt" style="color:var(--primary);margin-right:5px"></i> Suraksha Home Services &copy; 2026
    </div>
  </div>
</div>
<script>
(function() {
  var form = document.getElementById('loginForm');
  var btn = document.getElementById('loginBtn');
  var username = document.getElementById('username');
  var password = document.getElementById('password');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var valid = true;
    if (!username.value.trim()) {
      username.classList.add('error');
      valid = false;
    } else {
      username.classList.remove('error');
    }
    if (!password.value.trim()) {
      password.classList.add('error');
      valid = false;
    } else {
      password.classList.remove('error');
    }
    if (!valid) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
    setTimeout(function() {
      window.location.href = 'dashboard.html';
    }, 1200);
  });
  username.addEventListener('input', function() { this.classList.remove('error'); });
  password.addEventListener('input', function() { this.classList.remove('error'); });
})();
</script>
</body>
</html>
