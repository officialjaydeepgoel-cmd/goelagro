name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm ci || npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          echo "ANDROID_HOME from env: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT from env: $ANDROID_SDK_ROOT"
          echo "SDK dir contents:"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "No SDK at ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: goel-agro-apk
          path: android/app/build/outputs/apk/debug/*.apk
