name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          SDK_ROOT=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          echo "SDK Root: $SDK_ROOT"
          echo "Installing required SDK components..."
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -5 || true

      - name: Build APK
        working-directory: android
        run: |
          ANDROID_HOME=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          echo "ANDROID_HOME=$ANDROID_HOME"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: goel-agro-apk
          path: android/app/build/outputs/apk/debug/*.apk
