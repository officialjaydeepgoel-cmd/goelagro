name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm ci || npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "Android SDK root: /usr/local/lib/android/sdk"
          ls -la $ANDROID_HOME/ || echo "SDK not found at ANDROID_HOME"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "SDK not found at default path"
          which java && java -version

      - name: Build APK
        working-directory: android
        run: |
          SDK_ROOT="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "Using SDK at: $SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          chmod +x gradlew
          echo "Gradle version:"
          ./gradlew --version
          echo "Starting build..."
          ./gradlew assembleDebug --no-daemon 2>&1
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: goel-agro-apk
          path: android/app/build/outputs/apk/debug/*.apk
