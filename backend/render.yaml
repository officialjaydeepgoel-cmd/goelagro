services:
  - type: web
    name: goelagro-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run render:start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: goelagro-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://trade-seven-bay.vercel.app
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: CLOUDINARY_CLOUD_NAME
        value: dummmy
      - key: CLOUDINARY_API_KEY
        value: dummmy
      - key: CLOUDINARY_API_SECRET
        value: dummmy
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: dummy
      - key: SMTP_PASS
        value: dummy
      - key: TWILIO_ACCOUNT_SID
        value: dummy
      - key: TWILIO_AUTH_TOKEN
        value: dummy
      - key: TWILIO_PHONE_NUMBER
        value: +1234567890
      - key: REDIS_URL
        value: redis://localhost:6379

databases:
  - name: goelagro-db
    plan: free
    databaseName: goelagro
    ipAllowList: []
